dataset:
  tickers: [AAPL, MSFT, GOOGL, AMZN, META]
  start_date: "2000-01-01"
  end_date: "2024-12-31"
  target_col: close
  feature_cols: [open, high, low, close, volume]
  # Number of past days used as input features
  lookback: 30
  # Number of days to forecast
  horizon: 5
  # Train/val/test split ratios
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

models:
  arima:
    order: [5, 1, 0]
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
  lightgbm:
    n_estimators: 300
    num_leaves: 31
    learning_rate: 0.05
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
  gru:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    epochs: 50
    batch_size: 32
    learning_rate: 0.001

benchmark:
  # Number of times to repeat latency measurements
  n_latency_runs: 10
  # Batch sizes for throughput test
  throughput_batch_sizes: [1, 10, 100, 1000]
  results_dir: results/
